<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I N L A W L E S S</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --mint: #55D5C0; 
            --neon-core: #33ffcc;
            --charcoal: #1a1a1a; 
            --grey: #f9f9f9; 
        }

        body { 
            background: #ffffff; 
            color: var(--charcoal); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            text-align: center;
        }

        /* Premium Logo */
        .logo { 
            letter-spacing: 0.8em; 
            font-weight: 900; 
            font-size: 1.2rem; 
            padding: 60px 0 20px 0; 
            text-transform: uppercase; 
        }

        /* Hero Section */
        .hero { padding: 60px 20px; max-width: 900px; margin: 0 auto; }
        
        .intro-text { 
            letter-spacing: 0.3em; 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: #aaa; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
        }

        .hero h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.5rem, 8vw, 4.2rem); 
            line-height: 1.1; 
            margin: 0 auto 30px auto; 
            font-weight: 900;
            text-transform: uppercase;
        }

        /* THE NEON GLOW WORD */
        .hero h1 span { 
            font-family: 'Inter', sans-serif; 
            color: var(--mint); 
            font-weight: 900;
            text-shadow: 0 0 10px rgba(85, 213, 192, 0.6), 
                         0 0 20px rgba(85, 213, 192, 0.4);
        }

        .subheading {
            max-width: 750px;
            margin: 0 auto 45px auto;
            font-size: 0.85rem;
            line-height: 1.8;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--charcoal);
        }

        /* Sign Up Area */
        #signup-container { margin-bottom: 50px; }
        
        .email-input {
            padding: 20px; 
            border-radius: 0; 
            border: 1px solid #eee; 
            width: 300px; 
            text-align: center; 
            outline: none; 
            font-size: 0.85rem; 
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            text-transform: uppercase;
        }

        .button-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        /* NEON PULSE BUTTON */
        .btn-mint { 
            background: var(--mint); 
            color: white; 
            padding: 20px 50px; 
            font-weight: 900; 
            font-size: 0.85rem;
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border: none; 
            cursor: pointer;
            box-shadow: 0 0 15px rgba(85, 213, 192, 0.7);
            animation: neonPulse 2.5s infinite;
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 15px rgba(85, 213, 192, 0.6); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(85, 213, 192, 0.9), 0 0 10px var(--neon-core); transform: scale(1.02); }
            100% { box-shadow: 0 0 15px rgba(85, 213, 192, 0.6); transform: scale(1); }
        }

        .btn-outline { 
            background: transparent; 
            color: var(--charcoal); 
            padding: 20px 50px; 
            font-weight: 900; 
            font-size: 0.85rem;
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border: 1px solid #ddd; 
            cursor: pointer;
        }

        /* Wall of Shame */
        .shame-gallery { background: var(--grey); padding: 80px 20px; border-radius: 50px 50px 0 0; margin-top: 50px; }
        .shame-title { text-transform: uppercase; letter-spacing: 0.4em; font-size: 0.8rem; color: #bbb; margin-bottom: 40px; }
        .shame-card { background: white; padding: 35px; border-radius: 20px; margin: 0 auto 20px auto; max-width: 600px; border-left: 6px solid var(--mint); text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }

        /* Boutique */
        .boutique-section { padding: 80px 20px; }
        .product-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .product-card { width: 280px; text-align: left; }
        .product-img { width: 100%; height: 350px; background: #fdfdfd; border-radius: 15px; border: 1px solid #eee; }

    </style>
</head>

    <div class="logo">I N L A W L E S S</div>
