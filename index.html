<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I N L A W L E S S</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --mint: #55D5C0; --navy: #050a26; --charcoal: #1a1a1a; --grey: #f9f9f9; }
        body { background: #ffffff; color: var(--charcoal); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; text-align: center; scroll-behavior: smooth; }

        /* --- STICKY NAVIGATION --- */
        .header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 15px 0; background: rgba(255, 255, 255, 0.98);
            display: flex; justify-content: center; align-items: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; padding: 0 10px; }
        .nav-item {
            text-decoration: none; color: #888; font-weight: 900; font-size: 0.52rem;
            letter-spacing: 1.2px; text-transform: uppercase; transition: all 0.3s ease;
        }
        .nav-item:hover { color: var(--mint); text-shadow: 0 0 10px rgba(85, 213, 192, 0.8); }

        /* --- HERO & LOGO --- */
        .logo-container { padding: 160px 20px 10px 20px; }
        .logo { letter-spacing: 0.6em; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        .hero { padding: 40px 20px 80px 20px; max-width: 600px; margin: 0 auto; }
        .hero span.welcome { font-size: 0.7rem; letter-spacing: 4px; color: #888; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; line-height: 1.1; margin-bottom: 20px; text-transform: uppercase; }
        .hero h1 span { color: var(--mint); text-shadow: 0 0 15px rgba(85, 213, 192, 0.4); }
        
        .hero-subtext { font-size: 0.75rem; line-height: 1.8; color: #666; margin-bottom: 35px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; padding: 0 10px; }

        .email-input {
            width: 100%; max-width: 300px; padding: 22px; 
            border: 1px solid #eee; margin-bottom: 15px; outline: none; 
            font-size: 0.8rem; box-sizing: border-box; text-align: center;
            font-family: 'Inter', sans-serif; font-weight: 700;
            letter-spacing: 1px;
        }
        .btn-mint { 
            width: 100%; max-width: 300px; background: var(--mint); color: white; 
            padding: 22px; font-weight: 900; text-transform: uppercase; border: none; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s; font-size: 0.8rem;
        }

        .roadmap-container { background: var(--navy); color: white; padding: 100px 30px; text-align: left; }
